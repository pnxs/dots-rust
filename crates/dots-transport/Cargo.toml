[package]
name = "dots-transport"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Async transport for dots-rust: tokio_util::codec adapter for v2 transmission framing."

[dependencies]
dots-core.workspace = true
dots-model.workspace = true

bytes.workspace = true
tokio = { workspace = true, features = ["io-util", "sync", "macros", "net", "rt", "signal"] }
tokio-util = { workspace = true, features = ["codec"] }
futures-util = { version = "0.3", default-features = false, features = ["sink", "std"] }

[dev-dependencies]
dots-derive.workspace = true
tokio = { workspace = true, features = ["io-util", "macros", "rt", "sync", "time"] }
tokio-util = { workspace = true, features = ["codec"] }

[lints]
workspace = true
